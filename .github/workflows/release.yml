name: Build and Release WPF App

on:
  push:
    tags:
      - 'v*' # v1.0.0, v1.1.0 등의 태그가 푸시될 때 실행

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write # 릴리즈 생성 및 코드 푸시에 필요

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Build and Publish
      run: |
        dotnet publish "ColorCodePicker.csproj" -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Zip Release
      id: zip_step
      run: |
        $version = $env:GITHUB_REF_NAME.TrimStart('v')
        $zipName = "ColorCodePicker-v$version.zip"
        Compress-Archive -Path ./publish/ColorCodePicker.exe -DestinationPath $zipName
        echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV
        echo "VERSION=$version" >> $env:GITHUB_ENV

    - name: Generate appcast.xml
      run: |
        $version = $env:VERSION
        $date = (Get-Date).ToUniversalTime().ToString("r")
        $url = "https://github.com/iy7847/Color-Code/releases/download/$env:GITHUB_REF_NAME/$env:ZIP_NAME"
        
        $releaseNotes = git log -1 --pretty=%B
        
        $xml = @"
        <?xml version="1.0" encoding="utf-8"?>
        <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
          <channel>
            <title>Color Code Picker</title>
            <description>최신 릴리즈 정보</description>
            <language>ko</language>
            <item>
              <title>Version $version</title>
              <description><![CDATA[$releaseNotes]]></description>
              <pubDate>$date</pubDate>
              <enclosure url="$url" sparkle:version="$version" sparkle:os="windows" />
            </item>
          </channel>
        </rss>
        "@
        Set-Content -Path appcast.xml -Value $xml -Encoding UTF8

    - name: Commit and Push appcast.xml
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # 원격 main 브랜치를 가져와서 로컬 변경사항을 무시하고 강제로 병합
        git fetch origin main
        git checkout -f main
        git pull origin main
        
        # 위에서 생성/덮어쓴 appcast.xml을 다시 적용 (혹시 pull 과정에서 덮어써졌을 수 있으므로 안전을 위해)
        $version = $env:VERSION
        $date = (Get-Date).ToUniversalTime().ToString("r")
        $url = "https://github.com/iy7847/Color-Code/releases/download/$env:GITHUB_REF_NAME/$env:ZIP_NAME"
        
        $releaseNotes = git log -1 --pretty=%B
        
        $xml = @"
        <?xml version="1.0" encoding="utf-8"?>
        <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
          <channel>
            <title>Color Code Picker</title>
            <description>최신 릴리즈 정보</description>
            <language>ko</language>
            <item>
              <title>Version $version</title>
              <description><![CDATA[$releaseNotes]]></description>
              <pubDate>$date</pubDate>
              <enclosure url="$url" sparkle:version="$version" sparkle:os="windows" />
            </item>
          </channel>
        </rss>
        "@
        Set-Content -Path appcast.xml -Value $xml -Encoding UTF8

        git add appcast.xml
        git commit -m "Update appcast.xml for release $env:GITHUB_REF_NAME"
        git push origin main

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.ZIP_NAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
